---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@6df010e45fdb953369f12ab2bc69107d3c487f15 # v4.0.8
    with:
      super-linter-variables: |
        {
          "VALIDATE_CSS": false,
          "VALIDATE_JSCPD": false,
          "VALIDATE_JSON_PRETTIER": false,
          "VALIDATE_EDITORCONFIG": false
        }
