---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@ff9b59430b75056f2234fc204651ca64c9c4f474 # v4.0.9
    with:
      super-linter-variables: |
        {
          "VALIDATE_CSS": false,
          "VALIDATE_JSCPD": false
        }
